core:changelogs:
  - content: "---\npackages:\n  npm:@2digits/eslint-config:\n    type: patch\n---\n\n## Update pnpm workspace linting\n\n- Updated `eslint-plugin-pnpm` to 1.7.0 and refreshed generated rule types\n- Required `verifyDepsBeforeRun` to use warning mode in pnpm workspaces\n"
    filename: 2026-07-22-calm-pnpm-rules.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@2digits/oxfmt-config:\n    type: patch\n  npm:@2digits/oxlint-config:\n    type: patch\n---\n\n## Update Oxlint and Oxfmt\n\n- Updated `oxlint` to 1.75.0\n- Updated `oxfmt` to 0.60.0\n"
    filename: 2026-07-22-swift-ox-tools.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@2digits/oxlint-config:\n    type: patch\n---\n\n### Align rules and add Zod checks\n\nOxlint's newly supported React, TypeScript, Node.js, and JSDoc rules now match the corresponding ESLint configuration.\n\nZod schemas now receive the same checks through Oxlint's JavaScript plugin support. Config typings now use `oxlint-types`, and consumer overrides merge without dropping defaults.\n"
    filename: 2026-07-21-3013786a.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@2digits/renovate-config:\n    type: patch\n---\n\n## Update renovate to 43.275.2\n"
    filename: 2026-07-22-fresh-renovate.md
    v: 0.0.0
