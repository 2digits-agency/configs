  which-typed-array: npm:@nolyfill/which-typed-array@1.0.44

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

preferWorkspacePackages: true

savePrefix: ''
