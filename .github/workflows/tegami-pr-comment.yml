name: 💬 Tegami PR Comment

on:
  workflow_run:
    workflows:
      - ✉️ Tegami PR
    types:
      - completed

jobs:
  comment:
    name: 💬 Post release preview
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: 🗃️ Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ⚡Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true

      - name: 📥 Download release preview
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tegami-pr-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: 💬 Post release preview
        run: vp run tegami pr comment tegami-pr-preview.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
